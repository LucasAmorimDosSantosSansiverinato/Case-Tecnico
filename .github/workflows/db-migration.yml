name: Database Migration

on:
  push:
    branches: [main]
    paths:
      - 'migrations/**'
  workflow_dispatch:

jobs:
  migrate:
    name: Run Flyway migrations on Supabase
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Debug connection info
        run: |
          echo "URL length: ${#URL}"
          echo "USER: $DBUSER"
        env:
          URL: ${{ secrets.SUPABASE_DATABASE_URL }}
          DBUSER: ${{ secrets.SUPABASE_DB_USERNAME }}

      - name: Run migrations
        working-directory: migrations
        run: |
          mvn --batch-mode flyway:migrate \
            -Dflyway.url="${{ secrets.SUPABASE_DATABASE_URL }}" \
            -Dflyway.user="${{ secrets.SUPABASE_DB_USERNAME }}" \
            -Dflyway.password="${{ secrets.SUPABASE_DB_PASSWORD }}"
