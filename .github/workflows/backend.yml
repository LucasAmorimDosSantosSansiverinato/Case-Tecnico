name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
  pull_request:
    paths:
      - 'backend/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: backend
        run: mvn --batch-mode clean verify

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: backend
        run: mvn --batch-mode clean package -DskipTests

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: backend/desafioTecnico-webui/target/desafioTecnico-webui-1.0.0-SNAPSHOT.jar
          target: /opt/desafio/backend/

      - name: Restart backend on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            pkill -f desafioTecnico-webui || true
            nohup java -jar /opt/desafio/backend/backend/desafioTecnico-webui/target/desafioTecnico-webui-1.0.0-SNAPSHOT.jar \
              --DATABASE_URL=$DATABASE_URL \
              --DATABASE_USERNAME=$DATABASE_USERNAME \
              --DATABASE_PASSWORD=$DATABASE_PASSWORD \
              > /opt/desafio/backend/backend.log 2>&1 &
