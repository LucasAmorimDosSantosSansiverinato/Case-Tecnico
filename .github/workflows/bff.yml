name: BFF CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'bff/**'
  pull_request:
    paths:
      - 'bff/**'

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build and test
        working-directory: bff
        run: mvn --batch-mode clean verify

  deploy:
    name: Deploy to VM
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        working-directory: bff
        run: mvn --batch-mode clean package -DskipTests

      - name: Copy JAR to VM
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          source: bff/target/desafioTecnico-bff-1.0.0-SNAPSHOT.jar
          target: /opt/desafio/bff/

      - name: Restart BFF on VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            pkill -f desafioTecnico-bff || true
            nohup java -jar /opt/desafio/bff/bff/target/desafioTecnico-bff-1.0.0-SNAPSHOT.jar \
              --BACKEND_URL=http://localhost:8080 \
              --FRONTEND_ORIGIN=$FRONTEND_ORIGIN \
              > /opt/desafio/bff/bff.log 2>&1 &
